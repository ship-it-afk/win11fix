<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win11 Rescue & Tips Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078d4;
            --accent: #00c2ff;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent),
                              radial-gradient(circle at bottom left, #f1f5f9, transparent);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Responsive Container */
        .wrapper {
            width: 100%;
            max-width: 800px;
            margin-top: 5vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 800;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Modern Bento Search Box */
        .search-bento {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: row;
            gap: 10px;
            transition: transform 0.3s ease;
        }

        .search-bento:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }

        input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px 20px;
            font-size: 1.1rem;
            color: var(--text-main);
            outline: none;
            width: 100%;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background: #005a9e;
            box-shadow: 0 8px 15px rgba(0, 120, 212, 0.3);
        }

        /* Result Animation */
        #results {
            margin-top: 40px;
            width: 100%;
            display: none; /* Hidden until search */
        }

        .video-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .iframe-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .video-meta {
            padding: 25px;
        }

        .video-meta h2 {
            margin: 0;
            font-size: 1.25rem;
            line-height: 1.4;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .search-bento {
                flex-direction: column;
                padding: 15px;
                border-radius: 20px;
            }
            button {
                width: 100%;
                padding: 16px;
            }
            body { padding: 15px; }
        }

        .loading-spinner {
            text-align: center;
            color: var(--text-muted);
            margin-top: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Windows 11 Fix, Rescue & Tech Tip</h1>
        <p class="subtitle">Enter your issue or what tips you want to learn.</p>
    </header>

    <div class="search-bento">
        <input type="text" id="query" placeholder="Describe the error, problem or tip wanted to learn..." onkeypress="if(event.key==='Enter') findFix()">
        <button onclick="findFix()">Find</button>
    </div>

    <div id="results"></div>
</div>

<script>
    async function findFix() {
        const input = document.getElementById('query').value;
        const container = document.getElementById('results');
        const apiKey = 'AIzaSyC2e5gFq-R7BBrwEOrNAb_ooVDsQF2_ZLs'; // Replace with your real API Key

        if (!input.trim()) return;

        // Show loading state
        container.style.display = 'block';
        container.innerHTML = '<div class="loading-spinner">Analyzing Windows 11 database...</div>';

        // Prepend "Windows 11:" to the query automatically
        const searchTitle = `Windows 11 Guide: ${input}`;

        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(searchTitle)}&type=video&key=${apiKey}`);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                const video = data.items[0];
                const id = video.id.videoId;
                const title = video.snippet.title;

                container.innerHTML = `
                    <div class="video-card">
                        <div class="iframe-container">
                            <iframe src="https://www.youtube.com/embed/${id}?autoplay=0&rel=0" allowfullscreen></iframe>
                        </div>
                        <div class="video-meta">
                            <h2>${title}</h2>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = '<div class="loading-spinner">No matching fix found. Try a different description.</div>';
            }
        } catch (error) {
            container.innerHTML = '<div class="loading-spinner" style="color:#ef4444;">API Error: Please check your internet connection.</div>';
        }
    }
</script>

</body>
</html>

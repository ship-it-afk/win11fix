<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Rescue & Tips</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        /* Modern Container with Glassmorphism */
        .search-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
            text-align: center;
            margin-top: 5vh;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 30px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Responsive Input Group */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 480px) {
            .input-group {
                flex-direction: row;
            }
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }

        button {
            padding: 16px 32px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: scale(0.96);
        }

        /* Results & Video Styling */
        #results {
            margin-top: 40px;
            width: 100%;
            max-width: 650px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-wrapper {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .video-info {
            padding: 24px;
        }

        .video-info h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.5;
        }

        .status-msg {
            text-align: center;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 20px;
        }

        /* Loading Spinner */
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Android Rescue & Tips</h1>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Click here and describe error / tip" onkeypress="if(event.key==='Enter') executeSearch()">
            <button onclick="executeSearch()">Find</button>
        </div>
    </div>

    <div id="results"></div>

    <script>
        async function executeSearch() {
            const rawInput = document.getElementById('userInput').value;
            const resultsArea = document.getElementById('results');
            
            // Note: Keep your API key safe in production!
            const apiKey = 'AIzaSyC2e5gFq-R7BBrwEOrNAb_ooVDsQF2_ZLs';

            if (!rawInput.trim()) return;

            // Added loading state for better UX
            resultsArea.innerHTML = `
                <div class="spinner"></div>
                <p class="status-msg">Searching 2026 database for tips & solutions...</p>
            `;

            const finalQuery = `Android Guide: ${rawInput}`;

            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(finalQuery)}&type=video&key=${apiKey}`);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const video = data.items[0];
                    const vId = video.id.videoId;
                    const vTitle = video.snippet.title;

                    resultsArea.innerHTML = `
                        <div class="video-wrapper">
                            <div class="video-container">
                                <iframe src="https://www.youtube.com/embed/${vId}?rel=0" allowfullscreen></iframe>
                            </div>
                            <div class="video-info">
                                <h3>${vTitle}</h3>
                            </div>
                        </div>
                    `;
                } else {
                    resultsArea.innerHTML = '<p class="status-msg">We couldn\'t find a specific fix @ tip. Try different keywords.</p>';
                }
            } catch (error) {
                console.error(error);
                resultsArea.innerHTML = '<p class="status-msg" style="color:#ef4444;">Error occured. Please check your internet connection.</p>';
            }
        }
    </script>

</body>
</html>
